services:
  - type: web
    name: vacation-planner
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_API_KEY     # Gemini free tier — default provider
        sync: false
      # Add any of these to enable additional providers:
      # - key: GROQ_API_KEY       # Groq (pay-as-you-go, no free tier)
      #   sync: false
      # - key: OPENAI_API_KEY     # OpenAI (paid)
      #   sync: false
      # - key: ANTHROPIC_API_KEY  # Anthropic Claude (paid)
      #   sync: false
    plan: free
